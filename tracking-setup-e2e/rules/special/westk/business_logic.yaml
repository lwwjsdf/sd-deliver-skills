  - 全馆通行票
  productOperatingSchedule:
    type: date_range
    format: "{start} - {end}"
    date_format: "%Y.%m.%d"
    start_range: ["2025-06-01", "2025-09-01"]
    duration_days: [60, 120]
  productShowSchedule:
    type: datetime
    format: "%Y/%m/%d %H:%M:%S"
    range: ["2025-06-01", "2025-12-31"]
