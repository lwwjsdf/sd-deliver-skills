# 此文件为骨架，event_sequences[].events 需手动补充。

meta:
  project: westk
  version: '1.1'
  platforms:
  - MP
  - Web
region_distribution:
  mainland: 0.6
  hongkong: 0.3
  overseas: 0.1
user_segments:
  L0:
    ratio: 0.6
    identities:
    - unionid
    - cookie_id
    has_registration: false
    has_purchase: false
    has_membership: false
    membership_activated: false
  L1:
    ratio: 0.2
    identities:
    - mobile_or_email
    - unionid
    - cookie_id
    has_registration: true
    has_purchase: false
    has_membership: false
    membership_activated: false
  L2:
    ratio: 0.1
    identities:
    - mobile_or_email
    - unionid
    - cookie_id
    has_registration: true
    has_purchase: true
    has_membership: false
    membership_activated: false
  L3:
    ratio: 0.03
    identities:
    - mobile_or_email
    - unionid
    - cookie_id
    has_registration: true
    has_purchase: true
    has_membership: true
    membership_activated: false
  L4:
    ratio: 0.07
    identities:
    - mobile_or_email
    - unionid
    - cookie_id
    has_registration: true
    has_purchase: true
    has_membership: true
    membership_activated: true
identity_priority:
  crm_master_id:
    priority: 0
    display: CRM Master Customer ID
    sa_key: $identity_login_id
  email:
    priority: 1
    display: Email
    sa_key: $identity_email
  mobile:
    priority: 1
    display: Mobile
    sa_key: $identity_mobile
  unionid:
    priority: 2
    display: WeChat UnionID
    sa_key: $identity_unionid
  cookie_id:
    priority: 2
    display: CookieID
    sa_key: $identity_anonymous_id
event_sequences:
- name: user_lifecycle
  condition: null
  repeatable: false
  events:
  - event: $MPShow
    required: true
  - event: Registration_Result
    required: true
    time_after_prev: {min: 60, max: 600}
    fields: {isSuccess: true, registrationMethod: WeChat}
    profile_update: {registerTime: "{timestamp}"}
  - event: Login_Result
    required: true
    time_after_prev: {min: 5, max: 30}
    fields: {isSuccess: true, loginMethod: WeChat}

- name: daily_activity
  condition: null
  repeatable: true
  events:
  - event: $MPLaunch
    required: true
  - event: $MPShow
    required: true
    time_after_prev: {min: 1, max: 3}
  - event: Event_LandingPage_View
    required: true
    time_after_prev: {min: 2, max: 10}
  - event: Navigation_Click
    required: false
    time_after_prev: {min: 3, max: 15}
  - event: Product_ListPage_View
    required: true
    time_after_prev: {min: 5, max: 30}
  - event: Product_DetailPage_View
    required: true
    time_after_prev: {min: 5, max: 60}
  - event: $MPPageLeave
    required: true
    time_after_prev: {min: 30, max: 300}
  - event: $MPHide
    required: true
    time_after_prev: {min: 1, max: 5}

- name: daily_search
  condition: null
  repeatable: true
  conversion_rate: 0.4
  events:
  - event: Search_Start
    required: true
    time_after_prev: {min: 10, max: 60}
  - event: Search_Result
    required: true
    time_after_prev: {min: 2, max: 10}
  - event: Search_Result_Click
    required: false
    time_after_prev: {min: 2, max: 15}
  - event: Product_DetailPage_View
    required: false
    time_after_prev: {min: 3, max: 30}

- name: ticket_purchase
  condition: segment in [L2, L3, L4]
  repeatable: false
  terminal_states:
  - Ticket_Transfer
  - Ticket_Refund
  - Ticket_Admission
  events:
  - event: Product_Order_Payment
    required: true
    time_after_prev: {min: 300, max: 3600}
    fields:
      isSuccess: true
      ticketsQuantity: 2
      totalOrderAmount: 800.0
      orderPaidAmount: 800.0
      paymentMethod: WeChat Pay
  - event: Product_Payment_Detail
    required: true
    repeat: "{Product_Order_Payment.ticketsQuantity}"
    time_after_prev: {min: 1, max: 5}
    fields:
      ticketAmount: 400.0
      ticketPaidAmount: 400.0
      paymentMethod: WeChat Pay

- name: membership_normal_activation
  condition: segment in [L3, L4]
  repeatable: false
  conversion_rate: 0.8
  events:
  - event: Membership_Purchase
    required: true
    time_after_prev: {min: 600, max: 7200}
    fields:
      isSuccess: true
      purchaseType: 新购
      paymentMethod: WeChat Pay
      membershipType: M+会员
      membershipPrice: 500.0
      orderPaidAmount: 500.0
  - event: Membership_Activation
    required: true
    time_after_prev: {min: 86400, max: 432000}

- name: membership_late_activation
  condition: segment in [L3, L4]
  repeatable: false
  conversion_rate: 0.1
  events:
  - event: Membership_Purchase
    required: true
    time_after_prev: {min: 600, max: 7200}
    fields:
      isSuccess: true
      purchaseType: 新购
      paymentMethod: WeChat Pay
      membershipType: M+会员
      membershipPrice: 500.0
      orderPaidAmount: 500.0
  - event: Membership_Activation
    required: true
    time_after_prev: {min: 518400, max: 604800}

- name: membership_expired
  condition: segment in [L3, L4]
  repeatable: false
  conversion_rate: 0.1
  events:
  - event: Membership_Purchase
    required: true
    time_after_prev: {min: 600, max: 7200}
    fields:
      isSuccess: true
      purchaseType: 新购
      paymentMethod: WeChat Pay
      membershipType: M+会员
      membershipPrice: 500.0
      orderPaidAmount: 500.0
  - event: Membership_Refund
    required: true
    time_after_prev: {min: 604800, max: 691200}
    fields:
      refundAmount: 500.0
      refundGapAmount: 0.0
constraints:
- type: temporal_order
  description: Registration 在 Login 前
- type: temporal_order
  description: Login 在 Purchase 前
- type: field_consistency
  description: 票数明细数量等于订单票数
- type: field_consistency
  description: 明细金额之和不超过订单金额
- type: business_rule
  description: Admission 后不可 Refund
- type: business_rule
  description: Voucher 场景严格互斥
enums:
  voucher_scenario:
  - value: 项目订单
    applicable_events:
    - Product_Order_Payment
  - value: 商品订单
    applicable_events:
    - Merchandise_Order_Payment
  voucher_get_type:
  - 直发
  - 扫码
  - 手动领取
  business_unit:
  - M+博物馆(M)
  - 香港故宫文化博物馆(S)
  - 西九演艺(P)
  - 西九文化区(D)

