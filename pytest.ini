[pytest]
testpaths = sd-core/tests sd-tracking-design/tests sd-tracking-pipeline/tests sd-infra/tests sd-quality/tests sd-docs/tests sd-knowledge/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    unit: Unit tests with no external dependencies (fast, always run)
    integration: Tests requiring external services or network (skipped by default)
    slow: Tests taking longer than 5 seconds
